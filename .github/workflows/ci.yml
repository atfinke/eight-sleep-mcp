name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build MCP bundle
        run: npm run package:mcpb

      - name: Upload MCP bundle
        uses: actions/upload-artifact@v4
        with:
          name: eight-sleep-mcpb
          path: eight-sleep-mcp.mcpb
